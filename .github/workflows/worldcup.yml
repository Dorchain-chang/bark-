name: ⚽ 世界杯推送

on:
  schedule:
    # 每天早上 8:00 (北京时间 UTC+8 → UTC 0:00)
    - cron: "0 0 * * *"
    # 每天晚上 21:00 (北京时间 UTC+8 → UTC 13:00)
    - cron: "0 13 * * *"
  workflow_dispatch:      # 支持手动触发
    inputs:
      push_type:
        description: "推送类型"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装依赖
        run: pip install --no-cache-dir -r requirements.txt || true

      - name: 🌅 早上推送 - 今日赛程
        if: github.event.schedule == '0 0 * * *' || github.event.inputs.push_type == 'morning'
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          PUSH_TYPE: morning
          TZ: Asia/Shanghai
        run: python worldcup_push.py

      - name: 🌇 晚上推送 - 今日战报
        if: github.event.schedule == '0 13 * * *' || github.event.inputs.push_type == 'evening'
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          PUSH_TYPE: evening
          TZ: Asia/Shanghai
        run: python worldcup_push.py
