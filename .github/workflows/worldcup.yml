name: ⚽ 世界杯推送

on:
  schedule:
    # 每天早上 8:00 (北京时间 UTC+8 → UTC 0:00)
    - cron: "0 0 * * *"
    # 每天晚上 21:00 (北京时间 UTC+8 → UTC 13:00)
    - cron: "0 13 * * *"
  workflow_dispatch:      # 支持手动触发
    inputs:
      push_type:
        description: "推送类型"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔍 检查 BARK_KEY 是否已配置
        run: |
          if [ -z "${{ secrets.BARK_KEY }}" ]; then
            echo "❌ BARK_KEY 未设置！"
            echo "   请在 GitHub → Settings → Secrets → Actions → 添加 BARK_KEY"
            exit 1
          else
            echo "✅ BARK_KEY 已配置"
            echo "   长度: ${{ secrets.BARK_KEY }}" | sed 's/./*/g'
            echo "   密钥长度: $(echo -n "${{ secrets.BARK_KEY }}" | wc -c) 字符"
          fi

      - name: 📦 安装依赖
        run: pip install --no-cache-dir -r requirements.txt || true

      - name: 🏃 运行推送脚本
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          PUSH_TYPE: ${{ github.event.inputs.push_type || 'auto' }}
          TZ: Asia/Shanghai
        run: |
          echo "📋 触发方式: ${{ github.event_name }}"
          echo "📋 推送类型: ${{ github.event.inputs.push_type || 'auto(根据当前时间)' }}"
          python worldcup_push.py
