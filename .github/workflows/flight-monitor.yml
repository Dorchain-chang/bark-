name: ✈️ 低价机票监控

on:
  schedule:
    # 每天早上 8:00（北京时间 UTC+8 → UTC 0:00）
    - cron: "0 0 * * *"
  workflow_dispatch:      # 支持手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔍 检查 Secret 配置
        run: |
          if [ -z "${{ secrets.BARK_KEY }}" ]; then
            echo "❌ BARK_KEY 未设置！"
            echo "   请在 Settings → Secrets → Actions 添加"
            exit 1
          else
            echo "✅ BARK_KEY 已配置"
          fi
          if [ -z "${{ secrets.AMADEUS_API_KEY }}" ]; then
            echo "❌ AMADEUS_API_KEY 未设置！"
            echo "   请在 Settings → Secrets → Actions 添加"
            exit 1
          else
            echo "✅ AMADEUS_API_KEY 已配置"
          fi
          if [ -z "${{ secrets.AMADEUS_API_SECRET }}" ]; then
            echo "❌ AMADEUS_API_SECRET 未设置！"
            echo "   请在 Settings → Secrets → Actions 添加"
            exit 1
          else
            echo "✅ AMADEUS_API_SECRET 已配置"
          fi

      - name: 📦 安装依赖
        run: pip install amadeus

      - name: 🏃 查询低价航班
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          AMADEUS_API_KEY: ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
          TZ: Asia/Shanghai
        run: python flight_monitor.py
