name: ✈️ 低价机票监控（免注册版）

on:
  schedule:
    # 每天 8 次（北京时间 6:00-22:00 每 2 小时一次）
    - cron: "0 22 * * *"  # 06:00
    - cron: "0 0 * * *"   # 08:00
    - cron: "0 2 * * *"   # 10:00
    - cron: "0 4 * * *"   # 12:00
    - cron: "0 6 * * *"   # 14:00
    - cron: "0 8 * * *"   # 16:00
    - cron: "0 10 * * *"  # 18:00
    - cron: "0 12 * * *"  # 20:00
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔍 检查 BARK_KEY 是否配置
        run: |
          if [ -z "${{ secrets.BARK_KEY }}" ]; then
            echo "❌ BARK_KEY 未设置！"
            echo "   请在 Settings → Secrets → Actions 添加 BARK_KEY"
            exit 1
          else
            echo "✅ BARK_KEY 已配置"
          fi

      - name: 📦 安装依赖 + 浏览器
        run: |
          pip install playwright
          python -m playwright install chromium
          echo "✅ Playwright + Chromium 安装完成"

      - name: 🏃 查询低价航班
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          TZ: Asia/Shanghai
        run: python flight_monitor.py
